name: LLM Investment Simulator

on:
  schedule:
    # 平日 (月〜金) の JST 09:00 / 13:00 / 17:00 に起動
    # JST = UTC+9 なので UTC 00:00 / 04:00 / 08:00
    - cron: "0 0 * * 1-5"   # JST 09:00
    - cron: "0 4 * * 1-5"   # JST 13:00
    - cron: "0 8 * * 1-5"   # JST 17:00
  workflow_dispatch:          # 手動実行用
    inputs:
      session_override:
        description: "セッション番号 (1/2/3, 空欄=自動判定)"
        required: false
        default: ""

permissions:
  contents: write      # data/ への commit 用
  pages: write         # GitHub Pages deploy 用
  id-token: write

concurrency:
  group: "simulate-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  run-all:
    name: Simulation and Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install yfinance

      - name: Determine session number
        id: session
        run: |
          if [ -n "${{ github.event.inputs.session_override }}" ]; then
            echo "num=${{ github.event.inputs.session_override }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "00" ]; then
              echo "num=1" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "04" ]; then
              echo "num=2" >> $GITHUB_OUTPUT
            else
              echo "num=3" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run simulation (Set A)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FEE_RATE: ${{ vars.FEE_RATE || '0.001' }}
        run: python scripts/simulate.py --set a --session ${{ steps.session.outputs.num }}

      - name: Run simulation (Set B)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FEE_RATE: ${{ vars.FEE_RATE || '0.001' }}
        run: python scripts/simulate.py --set b --session ${{ steps.session.outputs.num }}

      - name: Generate HTML report
        run: python scripts/generate_report.py

      - name: Commit data and report changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update simulation data and reports [run-${{ github.run_number }}]"
          file_pattern: "data/** docs/**"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4